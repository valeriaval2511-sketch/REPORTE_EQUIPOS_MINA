<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Mina</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f6feb">

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 30px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }

    .sub {
      margin: 0 0 16px;
      color: #666;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfd6dd;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .readonly {
      background: #eef2f6;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-save {
      background: #1f6feb;
      color: #fff;
    }

    .btn-sync {
      background: #16a34a;
      color: #fff;
    }

    .status-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      background: #eef2f7;
    }

    .small {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
    }

    .count {
      margin-top: 8px;
      font-size: 13px;
      color: #444;
    }

    .pill {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #e8f0fe;
      color: #1f6feb;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Reporte de Equipos</h1>
      <p class="sub">REPORTE DE UBICACIÓN DE EQUIPOS</p>
      <div class="pill" id="estadoConexion">Verificando conexión...</div>

      <label for="tipo">Tipo de registro</label>
      <select id="tipo">
        <option value="Salida">Salida (cómo dejo el equipo)</option>
        <option value="Entrada">Entrada (cómo lo recibo)</option>
      </select>


      <label for="dni">DNI del operador</label>
      <input id="dni" list="listaDNITrabajadores" placeholder="Ingrese DNI">    
      <datalist id="listaDNITrabajadores">
        <option value="88526176">
        <option value="40607489">
        <option value="12584652">
        <option value="71526388">
      </datalist>

      <label for="equipo">Equipo</label>
      <input id="equipo" list="listaEquipos" placeholder="Escribe el equipo">
      <datalist id="listaEquipos">
        <option value="BT 3">
        <option value="BT 4">
        <option value="Jumbo J6">
        <option value="Scoop 15">
        <option value="Boltec 03">
        <option value="Boltec 04">
      </datalist>

      <label for="labor">Labor</label>
      <input id="labor" list="listaLabores" placeholder="Ejemplo: M-17, CX416">
      <datalist id="listaLabores">
        <option value="M-17">
        <option value="CX416">
        <option value="5211">
        <option value="3839">
        <option value="4039">
        <option value="M16">
        <option value="M17">
      </datalist>

      <label for="estado">Estado</label>
      <select id="estado">
        <option value="Operativo">Operativo</option>
        <option value="Inoperativo">Inoperativo</option>
        <option value="Mantenimiento correctivo">Mantenimiento correctivo</option>
        <option value="Mantenimiento preventivo">Mantenimiento preventivo</option>
        <option value="Stand By">Stand By</option>
      </select>

      <div class="row">
        <div>
          <label for="guardia">Guardia</label>
          <select id="guardia">
            <option value="">Seleccionar</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div>
          <label for="turno">Turno</label>
          <input id="turno" class="readonly" readonly>
        </div>
      </div>

      <label for="obs">Observación</label>
      <textarea id="obs" placeholder="Escribe la observación"></textarea>

      <label>Foto del equipo</label>
      <input type="file" id="foto" accept="image/*">

      <div class="btns">

        <button class="btn-save" onclick="guardar()">Guardar</button>
        <button class="btn-sync" onclick="sincronizar()">Sincronizar</button>
      </div>

      <hr>
      <label>Filtrar por Guardia</label>
      <select id="filtroGuardia">
        <option value="">Todas</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
      <label>Filtrar por Fecha</label>
      <input type="date" id="filtroFecha">
      
      <div id="tablaResumen"></div>
      <div class="status-box" id="mensaje">Listo para registrar.</div>
      <div class="count" id="contador"></div>
      <div class="small">Turno: Día = 7am a 7pm, Noche = 7pm a 7am.</div>


<script>
  const URL = "https://script.google.com/macros/s/AKfycbwN272nXZcq0pFa0-tINKlzhtS2t9hUvEs27wn7glHFdMMFaLCfxt8UavRwFFm41lWlLw/exec";
  let sincronizando = false;

  function obtenerPartesPeru() {
  const parts = new Intl.DateTimeFormat("es-PE", {
    timeZone: "America/Lima",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  }).formatToParts(new Date());

  const data = {};
  for (const p of parts) {
    if (p.type !== "literal") {
      data[p.type] = p.value;
    }
  }
  return data;
}

  function obtenerFechaHoraPeru() {
    const p = obtenerPartesPeru();
    return `${p.day}/${p.month}/${p.year} ${p.hour}:${p.minute}:${p.second}`;
  }

  function obtenerTurno() {
    const p = obtenerPartesPeru();
    const h = Number(p.hour);
    return (h >= 7 && h < 19) ? "Día" : "Noche";
  }

  function actualizarTurno() {
    document.getElementById("turno").value = obtenerTurno();
  }

  function mostrarMensaje(texto) {
    document.getElementById("mensaje").textContent = texto;
  }

  function actualizarContador() {
    const registros = JSON.parse(localStorage.getItem("data") || "[]");
    document.getElementById("contador").textContent =
      "Pendientes por sincronizar: " + registros.length;
  }

  function actualizarConexion() {
    const el = document.getElementById("estadoConexion");
    if (navigator.onLine) {
      el.textContent = "Con conexión";
      el.style.background = "#dcfce7";
      el.style.color = "#166534";
    } else {
      el.textContent = "Sin conexión";
      el.style.background = "#fee2e2";
      el.style.color = "#991b1b";
    }
  }

  function limpiarFormulario() {
    document.getElementById("dni").value = "";
    document.getElementById("equipo").value = "";
    document.getElementById("labor").value = "";
    document.getElementById("estado").value = "Operativo";
    document.getElementById("guardia").value = "";
    document.getElementById("obs").value = "";
    actualizarTurno();
  }

  function guardar() {
    const dni = document.getElementById("dni").value.trim();
    const equipo = document.getElementById("equipo").value.trim();
    const labor = document.getElementById("labor").value.trim();
    const estado = document.getElementById("estado").value;
    const guardia = document.getElementById("guardia").value;
    const turno = document.getElementById("turno").value;
    const observacion = document.getElementById("obs").value.trim();

    if (!dni || !equipo || !labor || !guardia) {
      mostrarMensaje("Completar dni, equipo, labor y guardia.");
      return;
    }

    const data = {
      fecha: obtenerFechaHoraPeru(),
      dni,
      equipo,
      labor,
      estado,
      guardia,
      turno,
      observacion
    };

    const registros = JSON.parse(localStorage.getItem("data") || "[]");
    document.getElementById("contador").textContent =
      "Pendientes por sincronizar: " + (registros ? registros.length : 0);
    registros.push(data);
    localStorage.setItem("data", JSON.stringify(registros));

    mostrarMensaje("Registro guardado offline.");
    actualizarContador();
    limpiarFormulario();

    mostrarTabla();
  }

  async function sincronizar() {
    if (sincronizando) {
      mostrarMensaje("Ya se está sincronizando...");
      return;
    }
        const registros = JSON.parse(localStorage.getItem("data") || "[]");

            if (registros.length === 0) {
              mostrarMensaje("No hay registros pendientes.");
              return;
            }
        
            if (!navigator.onLine) {
              mostrarMensaje("No hay internet. Los datos siguen guardados en el equipo.");
              return;
            }
        
            const btn = document.querySelector(".btn-sync");
            sincronizando = true;
            btn.disabled = true;
            btn.textContent = "Sincronizando...";
        
            try {
              for (const r of registros) {
          await fetch(URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain"
            },
            body: JSON.stringify(r)
          });
          }
      localStorage.removeItem("data"); // ← más limpio que poner "[]"
      actualizarContador(); // ← recalcula desde cero
      mostrarMensaje(`Sincronización completa ✅ (${registros.length})`);
    } catch (error) {
      console.error(error);
      mostrarMensaje("Error de conexión");
    } finally {
      sincronizando = false;
      btn.disabled = false;
      btn.textContent = "Sincronizar";
    }
  }
  function mostrarTabla() {
        const registros = JSON.parse(localStorage.getItem("data") || "[]");
      
        const guardiaFiltro = document.getElementById("filtroGuardia")?.value || "";
        const fechaFiltro = document.getElementById("filtroFecha")?.value || "";
      
        let html = "<table border='1' style='width:100%; font-size:12px'>";
        html += "<tr><th>Equipo</th><th>Labor</th><th>Estado</th><th>Obs</th><th>Guardia</th><th>Fecha</th></tr>";
      
        registros.forEach(r => {
      
          let fechaRegistro = "";
          if (r.fecha) {
            const partes = r.fecha.split(" ")[0].split("/");
            fechaRegistro = `${partes[2]}-${partes[1]}-${partes[0]}`;
          }
      
          if (
            (guardiaFiltro === "" || r.guardia === guardiaFiltro) &&
            (fechaFiltro === "" || fechaRegistro === fechaFiltro)
          ) {
            html += `<tr>
              <td>${r.equipo}</td>
              <td>${r.labor}</td>
              <td>${r.estado}</td>
              <td>${r.observacion}</td>
              <td>${r.guardia}</td>
              <td>${r.fecha}</td>
            </tr>`;
          }
      
        });
    
      html += "</table>";
      document.getElementById("tablaResumen").innerHTML = html;
    }


  window.addEventListener("online", () => {
    actualizarConexion();
    mostrarMensaje("Conexión recuperada. Sincronizando...");
    sincronizar();
  });

  document.getElementById("filtroGuardia").addEventListener("change", mostrarTabla);
  document.getElementById("filtroFecha").addEventListener("change", mostrarTabla);
  
  window.addEventListener("offline", actualizarConexion);

  actualizarTurno();
  actualizarContador();
  actualizarConexion();
  mostrarTabla();
 
</script>
</body>
</html>
