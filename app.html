<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Mina</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f6feb">

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 30px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }

    .sub {
      margin: 0 0 16px;
      color: #666;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfd6dd;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .readonly {
      background: #eef2f6;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-save {
      background: #1f6feb;
      color: #fff;
    }

    .btn-sync {
      background: #16a34a;
      color: #fff;
    }

    .status-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      background: #eef2f7;
    }

    .small {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
    }

    .count {
      margin-top: 8px;
      font-size: 13px;
      color: #444;
    }

    .pill {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #e8f0fe;
      color: #1f6feb;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Reporte de Equipos</h1>
      <p class="sub">Registro offline con sincronización a Google Sheets</p>
      <div class="pill" id="estadoConexion">Verificando conexión...</div>

      <label for="trabajador">Trabajador</label>
      <input id="trabajador" list="listaTrabajadores" placeholder="Escribe el nombre">
      <datalist id="listaTrabajadores">
        <option value="Valeria Diaz">
        <option value="Juan Perez">
        <option value="Luis Ramos">
        <option value="Carlos Quispe">
      </datalist>

      <label for="equipo">Equipo</label>
      <input id="equipo" list="listaEquipos" placeholder="Escribe el equipo">
      <datalist id="listaEquipos">
        <option value="BT 3">
        <option value="BT 4">
        <option value="Jumbo J6">
        <option value="Scoop 15">
        <option value="Boltec 03">
        <option value="Boltec 04">
      </datalist>

      <label for="labor">Labor</label>
      <input id="labor" list="listaLabores" placeholder="Ejemplo: M-17, CX416">
      <datalist id="listaLabores">
        <option value="M-17">
        <option value="CX416">
        <option value="5211">
        <option value="3839">
        <option value="4039">
        <option value="M16">
        <option value="M17">
      </datalist>

      <label for="estado">Estado</label>
      <select id="estado">
        <option value="Operativo">Operativo</option>
        <option value="Inoperativo">Inoperativo</option>
        <option value="Mantenimiento correctivo">Mantenimiento correctivo</option>
        <option value="Mantenimiento preventivo">Mantenimiento preventivo</option>
        <option value="Stand By">Stand By</option>
      </select>

      <div class="row">
        <div>
          <label for="guardia">Guardia</label>
          <select id="guardia">
            <option value="">Seleccionar</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div>
          <label for="turno">Turno</label>
          <input id="turno" class="readonly" readonly>
        </div>
      </div>

      <label for="obs">Observación</label>
      <textarea id="obs" placeholder="Escribe la observación"></textarea>

      <div class="btns">
        <button class="btn-save" onclick="guardar()">Guardar</button>
        <button class="btn-sync" onclick="sincronizar()">Sincronizar</button>
      </div>

      <div class="status-box" id="mensaje">Listo para registrar.</div>
      <div class="count" id="contador"></div>
      <div class="small">Turno automático: Día = 7am a 7pm, Noche = 7pm a 7am.</div>
    </div>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbxOw5mq_7kqrdQkyhTSh57mzny_LuZTyPjl3OLgl30hF8CkNsSkcJgVW8B9ezHO82b6qA/exec";

    function obtenerTurno() {
      const ahora = new Date();
      const h = ahora.getHours();
      return (h >= 7 && h < 19) ? "Día" : "Noche";
    }

    function actualizarTurno() {
      document.getElementById("turno").value = obtenerTurno();
    }

    function mostrarMensaje(texto) {
      document.getElementById("mensaje").textContent = texto;
    }

    function actualizarContador() {
      const registros = JSON.parse(localStorage.getItem("data") || "[]");
      document.getElementById("contador").textContent =
        "Pendientes por sincronizar: " + registros.length;
    }

    function actualizarConexion() {
      const el = document.getElementById("estadoConexion");
      if (navigator.onLine) {
        el.textContent = "Con conexión";
        el.style.background = "#dcfce7";
        el.style.color = "#166534";
      } else {
        el.textContent = "Sin conexión";
        el.style.background = "#fee2e2";
        el.style.color = "#991b1b";
      }
    }

    function limpiarFormulario() {
      document.getElementById("trabajador").value = "";
      document.getElementById("equipo").value = "";
      document.getElementById("labor").value = "";
      document.getElementById("estado").value = "Operativo";
      document.getElementById("guardia").value = "";
      document.getElementById("obs").value = "";
      actualizarTurno();
    }

    function guardar() {
      const trabajador = document.getElementById("trabajador").value.trim();
      const equipo = document.getElementById("equipo").value.trim();
      const labor = document.getElementById("labor").value.trim();
      const estado = document.getElementById("estado").value;
      const guardia = document.getElementById("guardia").value;
      const turno = document.getElementById("turno").value;
      const observacion = document.getElementById("obs").value.trim();

      if (!trabajador || !equipo || !labor || !guardia) {
        mostrarMensaje("Completa trabajador, equipo, labor y guardia.");
        return;
      }

      const data = {
        fecha: new Date().toISOString(),
        trabajador,
        equipo,
        labor,
        estado,
        guardia,
        turno,
        observacion
      };

      const registros = JSON.parse(localStorage.getItem("data") || "[]");
      registros.push(data);
      localStorage.setItem("data", JSON.stringify(registros));

      mostrarMensaje("Registro guardado offline.");
      actualizarContador();
      limpiarFormulario();
    }

    async function sincronizar() {
  const registros = JSON.parse(localStorage.getItem("data") || "[]");

  if (registros.length === 0) {
    mostrarMensaje("No hay registros pendientes.");
    return;
  }

  if (!navigator.onLine) {
    mostrarMensaje("No hay internet. Los datos siguen guardados en el equipo.");
    return;
  }

  let enviados = 0;
  const pendientes = [];

  for (const r of registros) {
    try {
      const resp = await fetch(URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(r)
      });

      const texto = await resp.text();

      if (resp.ok && texto.toLowerCase().includes("ok")) {
        enviados++;
      } else {
        pendientes.push(r);
      }

    } catch (e) {
      pendientes.push(r);
    }
  }

  localStorage.setItem("data", JSON.stringify(pendientes));

  mostrarMensaje(
    "Enviados: " + enviados + " | Pendientes: " + pendientes.length
  );

  actualizarContador();
}

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }

    window.addEventListener("online", actualizarConexion);
    window.addEventListener("offline", actualizarConexion);

    actualizarTurno();
    actualizarContador();
    actualizarConexion();
  </script>
</body>
</html>
