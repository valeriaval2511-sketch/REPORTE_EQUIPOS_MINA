<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Mina</title>

<style>
body {margin:0;background:#f4f6f8;font-family:Arial}
.container {max-width:500px;margin:auto;padding:15px}
.card {background:white;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}

h1 {font-size:22px;margin:0}
label {font-size:13px;font-weight:bold;margin-top:10px;display:block}

input, select, textarea {
  width:100%;padding:8px;border-radius:8px;border:1px solid #ccc;font-size:14px
}
textarea {height:70px}

.btns {display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
button {padding:10px;border:none;border-radius:8px;font-weight:bold}
.btn-save {background:#1f6feb;color:white}
.btn-sync {background:#16a34a;color:white}

table {width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
th {background:#1f6feb;color:white;padding:6px}
td {padding:6px;border-bottom:1px solid #ddd}

#mensaje {margin-top:10px;font-size:13px}
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>Reporte Equipos</h1>

<label>Tipo</label>
<select id="tipo">
<option value="Entrada">Entrada</option>
<option value="Salida">Salida</option>
</select>

<label>DNI</label>
<input id="dni">

<label>Equipo</label>
<input id="equipo">

<label>Labor</label>
<input id="labor">

<label>Estado</label>
<select id="estado">
<option>Operativo</option>
<option>Inoperativo</option>
</select>

<label>Guardia</label>
<select id="guardia">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<label>Observación</label>
<textarea id="obs"></textarea>

<div class="btns">
<button class="btn-save" onclick="guardar()">Guardar</button>
<button class="btn-sync" onclick="sincronizar()">Sincronizar</button>
</div>

<hr>

<h3>Datos del Excel</h3>

<label>Guardia</label>
<select id="filtroGuardia" onchange="cargarTablaExcel()">
<option value="">Todas</option>
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<label>Estado</label>
<select id="filtroEstado" onchange="cargarTablaExcel()">
<option value="">Todos</option>
<option>Operativo</option>
<option>Inoperativo</option>
</select>

<button onclick="cargarTablaExcel()">Actualizar</button>

<div id="tablaResumen"></div>

<div id="mensaje"></div>

</div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyLx0dJJ1y3tVI3gu81PS0WLCVT7RwSog_rS7JG8H7AGzwq1wm0Y-UFu_vVmANBQz8HuA/exec";

// MENSAJE
function mostrarMensaje(t){
  mensaje.textContent = t;
}

// GUARDAR LOCAL
function guardar(){
  let data = {
    fecha: new Date().toLocaleString(),
    tipo: tipo.value,
    dni: dni.value,
    equipo: equipo.value,
    labor: labor.value,
    estado: estado.value,
    guardia: guardia.value,
    turno: "",
    observacion: obs.value
  };

  let arr = JSON.parse(localStorage.getItem("data") || "[]");
  arr.push(data);
  localStorage.setItem("data", JSON.stringify(arr));

  mostrarMensaje("Guardado");

  if(navigator.onLine){
    sincronizar();
  }
}

// SINCRONIZAR
async function sincronizar(){
  let arr = JSON.parse(localStorage.getItem("data") || "[]");

  for(let r of arr){
    await fetch(URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body: JSON.stringify(r)
    });
  }

  localStorage.removeItem("data");
  mostrarMensaje("Sincronizado con Excel");
  cargarTablaExcel();
}

// AUTO SYNC
window.addEventListener("online", () => {
  mostrarMensaje("Conexión recuperada...");
  sincronizar();
});

// TABLA DESDE EXCEL
async function cargarTablaExcel(){
  try{
    const res = await fetch(URL);
    const data = await res.json();

    let g = filtroGuardia.value;
    let e = filtroEstado.value;

    let html = `
    <table style="width:100%; border-collapse:collapse; margin-top:10px;">
      <tr style="
        background:#0f5132;
        color:white;
        font-family:'Century Gothic';
        font-weight:bold;
      ">
        <th style="padding:8px">Equipo</th>
        <th style="padding:8px">Labor</th>
        <th style="padding:8px">Estado</th>
        <th style="padding:8px">Obs</th>
        <th style="padding:8px">Guardia</th>
      </tr>
    `;

    data.slice(1).forEach(r=>{

      if((!g || r[6]==g) && (!e || r[5]==e)){

        let colorEstado = "#fff";

        if(r[5] === "Operativo"){
          colorEstado = "#198754"; // verde empresa
        } 
        else if(r[5] === "Inoperativo"){
          colorEstado = "#dc3545"; // rojo
        } 
        else {
          colorEstado = "#ffc107"; // amarillo
        }

        html += `
        <tr style="font-family:Arial; border-bottom:1px solid #ddd">
          <td style="padding:6px">${r[3]}</td>
          <td style="padding:6px">${r[4]}</td>
          <td style="
            padding:6px;
            color:white;
            font-weight:bold;
            background:${colorEstado};
            border-radius:6px;
            text-align:center;
          ">
            ${r[5]}
          </td>
          <td style="padding:6px">${r[8]}</td>
          <td style="padding:6px">${r[6]}</td>
        </tr>
        `;
      }
    });

    html += "</table>";
    tablaResumen.innerHTML = html;

  }catch(err){
    console.error(err);
  }
}

</script>

</body>
</html>
