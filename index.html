<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Mina</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#198754">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#eef2f6;
  font-family:Arial, sans-serif;
  color:#222;
}

.container{
  max-width:520px;
  margin:auto;
  padding:14px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  overflow:visible;
}

h1,h3,label,th{
  font-family:'Century Gothic', Arial, sans-serif;
  font-weight:bold;
}

h1{
  margin:0 0 4px 0;
  font-size:22px;
}

.estado-box{
  margin-top:2px;
  font-size:12px;
  padding:5px 12px;
  border-radius:999px;
  display:inline-block;
  font-weight:bold;
}

.estado-ok{background:#d1fae5;color:#065f46}
.estado-off{background:#fee2e2;color:#991b1b}
.estado-sync{background:#fef3c7;color:#92400e}

.pendientes{
  margin-top:4px;
  font-size:12px;
  color:#555;
}

label{
  margin-top:10px;
  display:block;
  font-size:13px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #cfd6dd;
}

textarea{height:80px}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}

button{
  padding:11px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.btn-save{background:#2f6edb;color:white}
.btn-sync{background:#198754;color:white}

/* AUTOCOMPLETE */
.autocomplete-wrap{
  position:relative;
  z-index:999;
}

.autocomplete-wrap::after{
  content:"▼";
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:10px;
  color:#666;
}

.autocomplete-list{
  position:absolute;
  top:110%;
  left:0;
  right:0;
  background:white;
  border:1px solid #ccc;
  border-radius:12px;
  max-height:180px;
  overflow-y:auto;
  z-index:9999;
  display:none;
}

.autocomplete-item{
  padding:10px;
  cursor:pointer;
}

.autocomplete-item:hover{
  background:#f3f4f6;
}
/* AUTOCOMPLETE VISUAL */
.autocomplete-wrap{
  position:relative;
  z-index:999;
}

.autocomplete-wrap::after{
  content:"▼";
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:10px;
  color:#666;
  pointer-events:none;
}

.autocomplete-list{
  position:absolute;
  top:110%;
  left:0;
  right:0;
  background:#fff;
  border:1px solid #cfd6dd;
  border-radius:12px;
  max-height:180px;
  overflow-y:auto;
  z-index:9999;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  display:none;
}

.autocomplete-item{
  padding:10px 12px;
  font-size:13px;
  cursor:pointer;
  border-bottom:1px solid #f1f5f9;
}

.autocomplete-item:hover{
  background:#f3f4f6;
}

/* IMPORTANTE */
.card{
  overflow:visible;
}
</style>

  
</head>

<body>
<div class="container">
<div class="card">

<h1>Reporte Equipos</h1>

<div id="estadoConexion" class="estado-box">Verificando...</div>
<div id="pendientes" class="pendientes"></div>

<label>Tipo</label>
<select id="tipo">
<option>Entrada</option>
<option>Salida</option>
</select>

<div class="row">
<div>
<label>Guardia</label>
<input id="guardia" readonly>
</div>

<div>
<label>Labor</label>
<div class="autocomplete-wrap">
  <input id="labor" placeholder="Buscar labor..." autocomplete="off">
  <div id="listaLabor" class="autocomplete-list"></div>
</div>
</div>
</div>

<div class="row">
<div>
<label>Equipo</label>
<div class="autocomplete-wrap">
  <input id="equipo" placeholder="Buscar equipo..." autocomplete="off">
  <div id="listaEquipo" class="autocomplete-list"></div>
</div>
</div>

<div>
<label>Estado</label>
<select id="estado">
<option>Operativo</option>
<option>Inoperativo</option>
<option>Mantenimiento</option>
</select>
</div>
</div>

<label>DNI</label>
<div class="autocomplete-wrap">
  <input id="dni" placeholder="Buscar DNI..." autocomplete="off">
  <div id="listaDni" class="autocomplete-list"></div>
</div>

<label>Observación</label>
<textarea id="obs"></textarea>

<div class="btns">
<button class="btn-save" onclick="guardar()">Guardar</button>
<button id="btnSync" class="btn-sync" onclick="sincronizar()">Sincronizar</button>
</div>

<div id="mensaje"></div>

</div>
</div>

<script>

const URL = "PEGA_AQUI_TU_URL";

let listasMaestras = { dni: [], equipos: [], labores: [] };

async function cargarListasMaestras(){
  const res = await fetch(URL + "?listas=1");
  listasMaestras = await res.json();
}


// AUTOCOMPLETE MEJORADO
function inicializarAutocomplete(inputId, listaId, tipoLista) {
  const input = document.getElementById(inputId);
  const lista = document.getElementById(listaId);

  if (!input || !lista) return;

  input.addEventListener("input", () => {
    const valor = input.value.trim().toLowerCase();
    lista.innerHTML = "";

    const origen = listasMaestras[tipoLista] || [];

    const filtrados = origen
      .filter(item => item.toLowerCase().includes(valor))
      .slice(0, 8);

    if (!filtrados.length) {
      lista.style.display = "none";
      return;
    }

    filtrados.forEach(item => {
      const div = document.createElement("div");
      div.className = "autocomplete-item";
      div.textContent = item;

      div.onclick = () => {
        input.value = item;
        lista.style.display = "none";
      };

      lista.appendChild(div);
    });

    lista.style.display = "block";
  });

  // CLICK → MOSTRAR TODO
  input.addEventListener("focus", () => {
    lista.innerHTML = "";

    (listasMaestras[tipoLista] || []).slice(0, 8).forEach(item => {
      const div = document.createElement("div");
      div.className = "autocomplete-item";
      div.textContent = item;

      div.onclick = () => {
        input.value = item;
        lista.style.display = "none";
      };

      lista.appendChild(div);
    });

    lista.style.display = "block";
  });

  document.addEventListener("click", (e) => {
    if (!lista.contains(e.target) && e.target !== input) {
      lista.style.display = "none";
    }
  });
}

// INIT
window.addEventListener("load", async ()=>{
  await cargarListasMaestras();

  inicializarAutocomplete("dni","listaDni","dni");
  inicializarAutocomplete("equipo","listaEquipo","equipos");
  inicializarAutocomplete("labor","listaLabor","labores");
});

</script>

</body>
</html>
