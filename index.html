<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Mina</title>

<style>
*{box-sizing:border-box}

body{margin:0;background:#eef2f6;font-family:Arial}

.container{max-width:520px;margin:auto;padding:16px}

.card{
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08)
}

h1,h3,label,th{
  font-family:'Century Gothic';
  font-weight:bold;
}

.estado-box{
  margin-top:6px;
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  display:inline-block;
}

.estado-ok{background:#d1fae5;color:#065f46}
.estado-off{background:#fee2e2;color:#991b1b}
.estado-sync{background:#fef3c7;color:#92400e}

.pendientes{
  font-size:12px;
  margin-top:4px;
  color:#555;
}

label{margin-top:10px;display:block;font-size:13px}

input,select,textarea{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #ccc;
}

textarea{height:80px}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}

button{
  padding:11px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.btn-save{background:#2f6edb;color:white}
.btn-sync{background:#198754;color:white}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{background:#198754;color:white;padding:8px}
td{padding:8px;border-bottom:1px solid #eee}

.badge{
  padding:4px 8px;
  border-radius:20px;
  color:white;
  font-weight:bold;
}

#mensaje{margin-top:8px;font-size:13px}
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>Reporte Equipos</h1>

<div id="estadoConexion" class="estado-box">Verificando...</div>
<div id="pendientes" class="pendientes"></div>

<label>Tipo</label>
<select id="tipo">
<option>Entrada</option>
<option>Salida</option>
</select>

<div class="row">
<div>
<label>Guardia</label>
<input id="guardia" readonly>
</div>
<div>
<label>Labor</label>
<input id="labor">
</div>
</div>

<div class="row">
<div>
<label>Equipo</label>
<input id="equipo">
</div>
<div>
<label>Estado</label>
<select id="estado">
<option>Operativo</option>
<option>Inoperativo</option>
<option>Mantenimiento</option>
</select>
</div>
</div>

<label>DNI</label>
<input id="dni">

<label>Observación</label>
<textarea id="obs"></textarea>

<div class="btns">
<button class="btn-save" onclick="guardar()">Guardar</button>
<button id="btnSync" class="btn-sync" onclick="sincronizar()">Sincronizar</button>
</div>

<div id="mensaje"></div>

<hr>

<h3>Datos del Excel</h3>

<select id="filtroGuardia" onchange="cargarTablaExcel()">
<option value="">Todas</option>
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<select id="filtroEstado" onchange="cargarTablaExcel()">
<option value="">Todos</option>
<option>Operativo</option>
<option>Inoperativo</option>
<option>Mantenimiento</option>
</select>

<input type="date" id="filtroFecha" onchange="cargarTablaExcel()">

<button onclick="cargarTablaExcel()">Actualizar</button>

<div id="tablaResumen"></div>

</div>
</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzORn0IcBpv_UUAbFKBK1SBNyjy3fo4wz89f15N0suMpaXPmWYxJgK6dlZcEX6KqGBTtw/exec";

// FECHA
function obtenerFecha(){
let n=new Date();
return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}

// GUARDIA
function obtenerGuardia(){
let now=new Date();
let h=now.getHours();
let dia=h>=7&&h<19;

let base=new Date(dia?"2026-04-15T07:00:00":"2026-04-15T19:00:00");
if(!dia && h<7) now.setDate(now.getDate()-1);

let diff=Math.floor((now-base)/(1000*60*60*24));
let bloque=Math.floor(diff/7)%3;

if(dia){
if(bloque===0)return "B";
if(bloque===1)return "C";
return "A";
}else{
if(bloque===0)return "A";
if(bloque===1)return "B";
return "C";
}
}

setInterval(()=>guardia.value=obtenerGuardia(),1000);

// CONEXION
function actualizarEstado(tipo){
estadoConexion.className="estado-box";

if(tipo==="online"){
estadoConexion.textContent="Con conexión";
estadoConexion.classList.add("estado-ok");
}
if(tipo==="offline"){
estadoConexion.textContent="Sin conexión";
estadoConexion.classList.add("estado-off");
}
if(tipo==="sync"){
estadoConexion.textContent="Sincronizando...";
estadoConexion.classList.add("estado-sync");
}
}

function verificar(){
navigator.onLine?actualizarEstado("online"):actualizarEstado("offline");
}

window.addEventListener("online",()=>{
actualizarEstado("online");
let arr=JSON.parse(localStorage.getItem("data")||"[]");
if(arr.length>0) sincronizar();
});

window.addEventListener("offline",()=>actualizarEstado("offline"));

window.addEventListener("load",()=>{
let arr=JSON.parse(localStorage.getItem("data")||"[]");
if(navigator.onLine && arr.length>0) sincronizar();
});

verificar();

// CONTADOR
function actualizarPendientes(){
let arr=JSON.parse(localStorage.getItem("data")||"[]");
pendientes.textContent="Pendientes: "+arr.length;
}

// GUARDAR
function guardar(){
let data={
fecha:obtenerFecha(),
tipo:tipo.value,
dni:dni.value,
equipo:equipo.value,
labor:labor.value,
estado:estado.value,
guardia:obtenerGuardia(),
observacion:obs.value
};

let arr=JSON.parse(localStorage.getItem("data")||"[]");
arr.push(data);
localStorage.setItem("data",JSON.stringify(arr));

mostrarMensaje("Guardado");
actualizarPendientes();

dni.value="";
equipo.value="";
labor.value="";
obs.value="";
}

// SINCRONIZAR
let sincronizando=false;

async function sincronizar(){

if(sincronizando)return;

sincronizando=true;

btnSync.disabled=true;
btnSync.textContent="Enviando...";
actualizarEstado("sync");

let arr=JSON.parse(localStorage.getItem("data")||"[]");

try{
for(let r of arr){
await fetch(URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify(r)
});
}

localStorage.removeItem("data");
mostrarMensaje("Sincronizado");
}catch(e){
mostrarMensaje("Error al sincronizar");
}

btnSync.disabled=false;
btnSync.textContent="Sincronizar";
sincronizando=false;

actualizarEstado(navigator.onLine?"online":"offline");
actualizarPendientes();
cargarTablaExcel();
}

// TABLA
async function cargarTablaExcel(){
const res=await fetch(URL);
const data=await res.json();

let g=filtroGuardia.value;
let e=filtroEstado.value;
let f=filtroFecha.value;

let html="<table><tr><th>Equipo</th><th>Labor</th><th>Estado</th><th>Obs</th></tr>";

data.slice(1).forEach(r=>{

let fecha=r[0];
let estado=r[6];
let guardia=r[7];

let ok=true;

if(f){
let p=fecha.split("/");
let iso=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
ok=(iso===f);
}

if((!g||guardia==g)&&(!e||estado==e)&&ok){

let color="#999";
if(estado==="Operativo")color="#198754";
else if(estado==="Inoperativo")color="#dc3545";
else color="#ffc107";

html+=`
<tr>
<td>${r[4]}</td>
<td>${r[5]}</td>
<td><span class="badge" style="background:${color}">${estado}</span></td>
<td>${r[8]}</td>
</tr>`;
}
});

html+="</table>";
tablaResumen.innerHTML=html;
}

function mostrarMensaje(t){mensaje.textContent=t}

actualizarPendientes();
cargarTablaExcel();

</script>
</body>
</html>
