<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Mina</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f6feb">

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 30px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }

    .sub {
      margin: 0 0 16px;
      color: #666;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfd6dd;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .readonly {
      background: #eef2f6;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-save {
      background: #1f6feb;
      color: #fff;
    }

    .btn-sync {
      background: #16a34a;
      color: #fff;
    }

    .status-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      background: #eef2f7;
    }

    .small {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
    }

    .count {
      margin-top: 8px;
      font-size: 13px;
      color: #444;
    }

    .pill {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #e8f0fe;
      color: #1f6feb;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Reporte de Equipos</h1>
      <p class="sub">Ubicación de Equipos</p>
      <div class="pill" id="estadoConexion">Verificando conexión...</div>

      <label for="tipo">Tipo de registro</label>
      <select id="tipo">
        <option value="Salida">Salida (cómo dejo el equipo)</option>
        <option value="Entrada">Entrada (cómo lo recibo)</option>
      </select>


      <label for="dni">DNI del operador</label>
      <input id="dni" list="listaDNITrabajadores" placeholder="Ingrese DNI">    
      <datalist id="listaDNITrabajadores">
        <option value="88526176">
        <option value="40607489">
        <option value="12584652">
        <option value="71526388">
      </datalist>

      <label for="equipo">Equipo</label>
      <input id="equipo" list="listaEquipos" placeholder="Escribe el equipo">
      <datalist id="listaEquipos">
        <option value="BT 3">
        <option value="BT 4">
        <option value="Jumbo J6">
        <option value="Scoop 15">
        <option value="Boltec 03">
        <option value="Boltec 04">
      </datalist>

      <label for="labor">Labor</label>
      <input id="labor" list="listaLabores" placeholder="Ejemplo: M-17, CX416">
      <datalist id="listaLabores">
        <option value="M-17">
        <option value="CX416">
        <option value="5211">
        <option value="3839">
        <option value="4039">
        <option value="M16">
        <option value="M17">
      </datalist>

      <label for="estado">Estado</label>
      <select id="estado">
        <option value="Operativo">Operativo</option>
        <option value="Inoperativo">Inoperativo</option>
        <option value="Mantenimiento correctivo">Mantenimiento correctivo</option>
        <option value="Mantenimiento preventivo">Mantenimiento preventivo</option>
        <option value="Stand By">Stand By</option>
      </select>

      <div class="row">
        <div>
          <label for="guardia">Guardia</label>
          <select id="guardia">
            <option value="">Seleccionar</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div>
          <label for="turno">Turno</label>
          <input id="turno" class="readonly" readonly>
        </div>
      </div>

      <label for="obs">Observación</label>
      <textarea id="obs" placeholder="Escribe la observación"></textarea>

      <label>Foto del equipo</label>
      <input type="file" id="foto" accept="image/*">

      <div class="btns">

        <button class="btn-save" onclick="guardar()">Guardar</button>
        <button class="btn-sync" onclick="sincronizar()">Sincronizar</button>
      </div>

      <hr>

      <h3 style="margin-top:10px;">TABLA DE RESUMEN</h3>

      <label>Filtrar por Guardia</label>
      <select id="filtroGuardia">
        <option value="">Todas</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
      <label>Filtrar por Estado</label>
      <select id="filtroEstado">
        <option value="">Todos</option>
        <option value="Operativo">Operativo</option>
        <option value="Inoperativo">Inoperativo</option>
        <option value="Mantenimiento correctivo">Mantenimiento correctivo</option>
        <option value="Mantenimiento preventivo">Mantenimiento preventivo</option>
        <option value="Stand By">Stand By</option>
      </select>
      <label>Filtrar por Fecha</label>
      <input type="date" id="filtroFecha">

      <button onclick="toggleTabla()" id="btnTabla" style="
        margin-bottom:10px;
        background:#1f6feb;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        font-weight:bold;
      ">
        Mostrar Tabla
      </button>
      
      <div id="tablaResumen" style="display:none;"></div>
      <div class="status-box" id="mensaje">Listo para registrar.</div>
      <div class="count" id="contador"></div>
      <div class="small">Turno: Día = 7am a 7pm, Noche = 7pm a 7am.</div>

<script>
  const URL = "https://script.google.com/macros/s/AKfycbwmY1oy6BjnceAPT68Wx9ivln2r77HRIm6phktbKhS1qbHXseP6WIWowY7e11PLtYfbrQ/exec";
  let sincronizando = false;

  function obtenerPartesPeru() {
  const parts = new Intl.DateTimeFormat("es-PE", {
    timeZone: "America/Lima",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  }).formatToParts(new Date());

  const data = {};
  for (const p of parts) {
    if (p.type !== "literal") {
      data[p.type] = p.value;
    }
  }
  return data;
}

  function obtenerFechaHoraPeru() {
    const p = obtenerPartesPeru();
    return `${p.day}/${p.month}/${p.year} ${p.hour}:${p.minute}:${p.second}`;
  }

  function obtenerTurno() {
    const p = obtenerPartesPeru();
    const h = Number(p.hour);
    return (h >= 7 && h < 19) ? "Día" : "Noche";
  }

  function actualizarTurno() {
    document.getElementById("turno").value = obtenerTurno();
  }

  function mostrarMensaje(texto) {
    document.getElementById("mensaje").textContent = texto;
  }

  function actualizarContador() {
    const registros = JSON.parse(localStorage.getItem("data") || "[]");
    document.getElementById("contador").textContent =
      "Pendientes por sincronizar: " + registros.length;
  }

  async function actualizarConexion() {
    const el = document.getElementById("estadoConexion");
  
    try {
      const res = await fetch(URL + "?ping=1", { 
        method: "GET",
        cache: "no-store"
      });
  
      if (res.ok) {
        el.textContent = "Conectado al servidor";
        el.style.background = "#dcfce7";
        el.style.color = "#166534";
      } else {
        throw new Error();
      }
  
    } catch (error) {
      el.textContent = "Sin conexión al servidor";
      el.style.background = "#fee2e2";
      el.style.color = "#991b1b";
    }
  }

  window.addEventListener("online", actualizarConexion);
  window.addEventListener("offline", actualizarConexion);

  function limpiarFormulario() {
    document.getElementById("dni").value = "";
    document.getElementById("equipo").value = "";
    document.getElementById("labor").value = "";
    document.getElementById("estado").value = "Operativo";
    document.getElementById("guardia").value = "";
    document.getElementById("obs").value = "";
    actualizarTurno();
  }

  function guardar() {
    const tipo = document.getElementById("tipo").value;
    const dni = document.getElementById("dni").value.trim();
    const equipo = document.getElementById("equipo").value.trim();
    const labor = document.getElementById("labor").value.trim();
    const estado = document.getElementById("estado").value;
    const guardia = document.getElementById("guardia").value;
    const turno = document.getElementById("turno").value;
    const observacion = document.getElementById("obs").value.trim();
    const file = document.getElementById("foto").files[0];
  
    let faltantes = [];

    if (!dni) faltantes.push("DNI");
    if (!equipo) faltantes.push("Equipo");
    if (!labor) faltantes.push("Labor");
    if (!guardia) faltantes.push("Guardia");
    if (!file) faltantes.push("Foto");
    if (!observacion.trim()) faltantes.push("Observación");
    
    if (faltantes.length > 0) {
      mostrarMensaje("Falta: " + faltantes.join(", "));
      return;
    }
  
    let data = {
      fecha: obtenerFechaHoraPeru(),
      tipo: tipo || "Sin definir",
      dni,
      equipo,
      labor,
      estado,
      guardia,
      turno,
      observacion
    };
  
    const guardarLocal = (dataFinal) => {
      const registros = JSON.parse(localStorage.getItem("data") || "[]");
      registros.push(dataFinal);
      localStorage.setItem("data", JSON.stringify(registros));
  
      mostrarMensaje("Guardado offline.");
      actualizarContador();
      limpiarFormulario();
  
      document.getElementById("foto").value = ""; // BORRA FOTO
      mostrarTabla();
    };

    comprimirImagen(file, function(imagenComprimida) {
      data.foto = imagenComprimida;
      guardarLocal(data);
    });

  }

  async function sincronizar() {
    if (sincronizando) {
      mostrarMensaje("Ya se está sincronizando...");
      return;
    }
  
    const registros = JSON.parse(localStorage.getItem("data") || "[]");
  
    if (registros.length === 0) {
      mostrarMensaje("No hay registros pendientes.");
      return;
    }
  
    if (!navigator.onLine) {
      mostrarMensaje("No hay internet.");
      return;
    }
  
    const btn = document.querySelector(".btn-sync");
    sincronizando = true;
    btn.disabled = true;
    btn.textContent = "Sincronizando...";
  
    try {
      let enviados = 0;
  
      for (const r of registros) {
        if (!r.tipo) r.tipo = "Sin definir";
  
        try {
          const res = await fetch(URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(r)
          });
  
          if (res.ok) enviados++;
  
        } catch (err) {
          console.log("Error en un registro");
        }
      }
  
      if (enviados === registros.length) {
        localStorage.removeItem("data");
        mostrarMensaje("Sincronizado correctamente ✅");
      } else {
        mostrarMensaje("Algunos datos no se enviaron");
      }
  
    } catch (error) {
      console.error(error);
      mostrarMensaje("Error de conexión");
    } finally {
      sincronizando = false;
      btn.disabled = false;
      btn.textContent = "Sincronizar";
      actualizarContador();
    }
  }
  
  function mostrarTabla() {
    const registros = JSON.parse(localStorage.getItem("data") || "[]");
  
    const guardiaFiltro = document.getElementById("filtroGuardia").value;
    const fechaFiltro = document.getElementById("filtroFecha").value;
    const estadoFiltro = document.getElementById("filtroEstado").value;
  
    let html = "<table border='1' style='width:100%; font-size:12px'>";
    html += "<tr><th>Equipo</th><th>Labor</th><th>Estado</th><th>Obs</th><th>Guardia</th><th>Fecha</th></tr>";
  
    registros.forEach(r => {
  
      let fechaOK = true;
  
      if (fechaFiltro) {
        const partes = r.fecha.split(" ")[0].split("/");
        const fechaISO = `${partes[2]}-${partes[1].padStart(2,"0")}-${partes[0].padStart(2,"0")}`;
        fechaOK = fechaISO === fechaFiltro;
      }
  
      if (
        (guardiaFiltro === "" || r.guardia === guardiaFiltro) &&
        fechaOK &&
        (estadoFiltro === "" || r.estado === estadoFiltro)
      ) {
        html += `<tr>
          <td>${r.equipo}</td>
          <td>${r.labor}</td>
          <td>${r.estado}</td>
          <td>${r.observacion}</td>
          <td>${r.guardia}</td>
          <td>${r.fecha}</td>
        </tr>`;
      }
  
    });
  
    html += "</table>";
    document.getElementById("tablaResumen").innerHTML = html;
  }

  function toggleTabla() {
    const tabla = document.getElementById("tablaResumen");
    const btn = document.getElementById("btnTabla");
  
    if (tabla.style.display === "none") {
      tabla.style.display = "block";
      mostrarTabla();
      btn.textContent = "Ocultar Tabla";
    } else {
      tabla.style.display = "none";
      btn.textContent = "Mostrar Tabla";
    }
  }

  function comprimirImagen(file, callback) {
    const reader = new FileReader();
  
    reader.onload = function (event) {
      const img = new Image();
  
      img.onload = function () {
        const canvas = document.createElement("canvas");
  
        const MAX_WIDTH = 800;
        let width = img.width;
        let height = img.height;
  
        if (width > MAX_WIDTH) {
          height = height * (MAX_WIDTH / width);
          width = MAX_WIDTH;
        }
  
        canvas.width = width;
        canvas.height = height;
  
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
  
        const compressed = canvas.toDataURL("image/jpeg", 0.7);
  
        callback(compressed);
      };
  
      img.src = event.target.result;
    };
  
    reader.readAsDataURL(file);
  }


  window.addEventListener("online", () => {
    actualizarConexion();
    mostrarMensaje("Conexión recuperada. Sincronizando...");
    sincronizar();
  });

  document.getElementById("filtroGuardia").addEventListener("change", mostrarTabla);
  document.getElementById("filtroFecha").addEventListener("change", mostrarTabla);
  document.getElementById("filtroEstado").addEventListener("change", mostrarTabla);
  
  window.addEventListener("offline", actualizarConexion);

  actualizarTurno();
  actualizarContador();
  window.addEventListener("load", () => {
    actualizarConexion();
    setInterval(actualizarConexion, 10000); // cada 10s
  });
 
</script>
</body>
</html>
