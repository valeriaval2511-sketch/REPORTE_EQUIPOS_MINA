<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Mina</title>

<style>
body {margin:0;background:#eef2f6;font-family:Arial}
.container {max-width:500px;margin:auto;padding:15px}
.card {background:white;padding:16px;border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,0.08)}

h1 {font-family:'Century Gothic';font-weight:bold;font-size:22px}
label {font-size:13px;font-weight:bold;margin-top:10px;display:block}

input, select, textarea {
  width:100%;padding:9px;border-radius:10px;border:1px solid #d1d5db;font-size:14px
}

textarea {height:70px}

.btns {display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
button {padding:11px;border-radius:10px;font-weight:bold;border:none}

.btn-save {background:#2f6edb;color:white}
.btn-sync {background:#198754;color:white}

table {width:100%;border-collapse:collapse;margin-top:10px}
th {
  background:#198754;
  color:white;
  font-family:'Century Gothic';
  padding:8px;
}
td {padding:8px;border-bottom:1px solid #eee}
tr:hover {background:#f3f4f6}

#mensaje {margin-top:10px;font-size:13px}
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>Reporte Equipos</h1>

<label>Tipo</label>
<select id="tipo">
<option value="Entrada">Entrada</option>
<option value="Salida">Salida</option>
</select>

<label>DNI</label>
<input id="dni">

<label>Equipo</label>
<input id="equipo">

<label>Labor</label>
<input id="labor">

<label>Estado</label>
<select id="estado">
<option>Operativo</option>
<option>Inoperativo</option>
<option>Mantenimiento</option>
</select>

<label>Guardia</label>
<select id="guardia">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<label>Observación</label>
<textarea id="obs"></textarea>

<div class="btns">
<button class="btn-save" onclick="guardar()">Guardar</button>
<button class="btn-sync" onclick="sincronizar()">Sincronizar</button>
</div>

<hr>

<h3>Datos del Excel</h3>

<label>Guardia</label>
<select id="filtroGuardia" onchange="cargarTablaExcel()">
<option value="">Todas</option>
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<label>Estado</label>
<select id="filtroEstado" onchange="cargarTablaExcel()">
<option value="">Todos</option>
<option>Operativo</option>
<option>Inoperativo</option>
<option>Mantenimiento</option>
</select>

<label>Fecha</label>
<input type="date" id="filtroFecha" onchange="cargarTablaExcel()">

<button onclick="cargarTablaExcel()">Actualizar</button>

<div id="tablaResumen"></div>
<div id="mensaje"></div>

</div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyvHMhLivrnkPNzOAe6v3Gy5Toi2FPjDqddvwcJ4ykqBuMktkCqp18ndbRVtLQzTfExQw/exec";

function mostrarMensaje(t){mensaje.textContent=t}

// GUARDAR LOCAL
function guardar(){
  let data={
    fecha:new Date().toLocaleString("es-PE"),
    tipo:tipo.value,
    dni:dni.value,
    equipo:equipo.value,
    labor:labor.value,
    estado:estado.value,
    guardia:guardia.value,
    turno:"",
    observacion:obs.value
  }

  let arr=JSON.parse(localStorage.getItem("data")||"[]")
  arr.push(data)
  localStorage.setItem("data",JSON.stringify(arr))

  mostrarMensaje("Guardado")

  if(navigator.onLine){
    sincronizar()
  }
}

// SINCRONIZAR
async function sincronizar(){
  let arr=JSON.parse(localStorage.getItem("data")||"[]")

  for(let r of arr){
    await fetch(URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(r)
    })
  }

  localStorage.removeItem("data")
  mostrarMensaje("Sincronizado con Excel")
  cargarTablaExcel()
}

// AUTO SYNC
window.addEventListener("online",()=>{
  mostrarMensaje("Conexión recuperada...")
  sincronizar()
})

// TABLA DESDE EXCEL
async function cargarTablaExcel(){
  const res=await fetch(URL)
  const data=await res.json()

  let g=filtroGuardia.value
  let e=filtroEstado.value
  let f=filtroFecha.value

  let html="<table><tr><th>Equipo</th><th>Labor</th><th>Estado</th><th>Obs</th><th>Guardia</th><th>Fecha</th></tr>"

  data.slice(1).forEach(r=>{

    let fechaExcel=r[0]
    let estado=r[6]
    let guardia=r[7]

    let fechaOK=true

    if(f){
      let p=fechaExcel.split("/")
      let iso=`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`
      fechaOK=(iso===f)
    }

    if((!g||guardia==g)&&(!e||estado==e)&&fechaOK){

      let color="#999"
      if(estado==="Operativo") color="#198754"
      else if(estado==="Inoperativo") color="#dc3545"
      else color="#ffc107"

      html+=`
      <tr>
        <td>${r[4]}</td>
        <td>${r[5]}</td>
        <td>
          <span style="
            background:${color};
            color:white;
            padding:4px 8px;
            border-radius:20px;
            font-weight:bold;
          ">
            ${estado}
          </span>
        </td>
        <td>${r[9]}</td>
        <td>${guardia}</td>
        <td>${fechaExcel}</td>
      </tr>
      `
    }
  })

  html+="</table>"
  tablaResumen.innerHTML=html
}

</script>

</body>
</html>
